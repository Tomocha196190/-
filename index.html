<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ネオン放置クリッカー</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

body {
  margin:0;
  font-family: 'Orbitron', sans-serif;
  background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:white;
  text-align:center;
}

/* タイトル */
h1 { margin-top:20px; text-shadow: 0 0 10px cyan; }

/* コイン表示 */
#coin {
  font-size:50px;
  margin:20px;
  position:relative;
  text-shadow: 0 0 20px yellow;
}

/* ボタン */
button {
  padding:15px 30px;
  margin:10px;
  font-size:18px;
  cursor:pointer;
  border:none;
  border-radius:15px;
  background: linear-gradient(145deg, #ff0080, #7928ca);
  color:white;
  box-shadow: 0 0 15px #ff0080, 0 0 30px #7928ca;
  transition: all 0.2s;
}
button:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 0 25px #ff0080, 0 0 50px #7928ca;
}

/* ショップ */
#shop { margin-top:20px; }

/* 浮かぶ数字 */
.floating {
  position:absolute;
  font-size:20px;
  color:#0ff;
  text-shadow:0 0 10px #0ff, 0 0 20px #0ff;
  animation: floatUp 1s ease-out forwards;
}
@keyframes floatUp {
  0% { opacity:1; transform: translateY(0) scale(1); }
  100% { opacity:0; transform: translateY(-60px) scale(1.5); }
}

/* レスポンシブ */
@media(max-width:600px){
  #coin { font-size:36px; }
  button { font-size:16px; padding:12px 20px; }
}
</style>
</head>
<body>

<h1>💎 ネオン放置クリッカー</h1>
<div id="coin">0</div>

<button onclick="clickCoin()">💥 クリック！</button>

<div id="shop">
  <h2>強化ショップ</h2>
  <button id="clickBtn" onclick="buyClick()">クリック強化 (コスト: 10)</button>
  <button id="autoBtn" onclick="buyAuto()">自動収入 (コスト: 20)</button>
</div>

<script>
// --- ゲーム変数 ---
let coins = 0;
let clickPower = 1;
let autoPower = 0;
let clickCost = 10;
let autoCost = 20;

// 効果音
const clickSound = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
const upgradeSound = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

// --- セーブ＆ロード ---
function saveGame() {
  localStorage.setItem("coins", coins);
  localStorage.setItem("clickPower", clickPower);
  localStorage.setItem("autoPower", autoPower);
  localStorage.setItem("clickCost", clickCost);
  localStorage.setItem("autoCost", autoCost);
  localStorage.setItem("lastTime", Date.now());
}

function loadGame() {
  let saved = localStorage.getItem("coins");
  if(saved){
    coins = parseFloat(saved);
    clickPower = parseInt(localStorage.getItem("clickPower"));
    autoPower = parseInt(localStorage.getItem("autoPower"));
    clickCost = parseFloat(localStorage.getItem("clickCost"));
    autoCost = parseFloat(localStorage.getItem("autoCost"));
    
    // オフライン報酬
    let lastTime = parseInt(localStorage.getItem("lastTime"));
    let sec = Math.floor((Date.now() - lastTime)/1000);
    let gain = sec * autoPower;
    if(gain>0) showFloating(`+${gain}`);
    coins += gain;
  }
}
loadGame();

// --- 表示更新 ---
function update(){
  document.getElementById("coin").innerText = Math.floor(coins);
  document.getElementById("clickBtn").innerText = `クリック強化 (コスト: ${Math.floor(clickCost)})`;
  document.getElementById("autoBtn").innerText = `自動収入 (コスト: ${Math.floor(autoCost)})`;
  saveGame();
}

// --- 浮かぶ数字 ---
function showFloating(text){
  let div = document.createElement("div");
  div.className="floating";
  div.innerText=text;
  document.getElementById("coin").appendChild(div);
  setTimeout(()=>div.remove(),1000);
}

// --- クリック ---
function clickCoin(){
  coins += clickPower;
  showFloating(`+${clickPower}`);
  clickSound.play();
  update();
}

// --- クリック強化 ---
function buyClick(){
  if(coins >= clickCost){
    coins -= clickCost;
    clickPower++;
    clickCost *= 1.3; // インフレ
    upgradeSound.play();
    showFloating(`💎 +1 Click`);
    update();
  }
}

// --- 自動収入 ---
function buyAuto(){
  if(coins >= autoCost){
    coins -= autoCost;
    autoPower++;
    autoCost *= 1.4; // インフレ
    upgradeSound.play();
    showFloating(`💎 +1 Auto`);
    update();
  }
}

// --- 放置収入 ---
setInterval(()=>{
  if(autoPower>0){
    coins += autoPower;
    showFloating(`+${autoPower}`);
    update();
  }
},1000);

// --- セーブ間隔 ---
setInterval(saveGame,5000);

// 初回表示
update();
</script>

</body>
</html>
